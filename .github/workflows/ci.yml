name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (logic deps only — no model download in CI)
        run: |
          python -m pip install --upgrade pip
          pip install numpy cryptography pytest ruff
      - name: Lint
        run: ruff check aisecurity scripts
      - name: Test (crypto + gallery logic)
        run: pytest tests/test_crypto.py tests/test_gallery.py -v
